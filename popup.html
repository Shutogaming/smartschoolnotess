<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Shuto Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📝 Shuto Notes</h1>

    <div class="note-input">
      <input type="text" id="title" placeholder="Titel van je notitie...">
      <input type="text" id="subject" placeholder="Vak (komt onder de titel)">
      <textarea id="content" placeholder="Schrijf hier je notitie..."></textarea>
      <button id="addNote">Toevoegen</button>
    </div>

    <div id="notes"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
